<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Group Members</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="back-button">&larr;</div>
            <div class="header-text">
                <h1>Messenger</h1>
                <p class="url">meldenlaurente10-boop.github.io</p>
            </div>
        </header>

        <main class="content">
            <h2 class="section-title">Group Members</h2>

            <!-- Leader Section -->
            <div class="member">
                <img src="Roselle Bantigue.png" alt="Roselle Bantigue" class="profile-img">
                <div class="info">
                    <p class="name">Roselle Bantigue</p>
                    <p class="role">Leader</p>
                </div>
            </div>

            <!-- Designers Section -->
            <div class="member">
                <img src="Melden Laurente.jpg" alt="Melden Laurente" class="profile-img">
                <div class="info">
                    <p class="name">Melden Laurente</p>
                    <p class="role">Designer</p>
                </div>
            </div>
            <div class="member">
                <img src="Raven Agravante.jpg" alt="Raven Agravante" class="profile-img">
                <div class="info">
                    <p class="name">Raven Agravante</p>
                    <p class="role">Designer</p>
                </div>
            </div>
            <div class="member">
                <img src="Joy Ann Giango.png" alt="Joy Ann Giango" class="profile-img">
                <div class="info">
                    <p class="name">Joy Ann Giango</p>
                    <p class="role">Designer</p>
                </div>
            </div>

            <!-- Developers Section -->
            <div class="member">
                <img src="Cristene Espina.png" alt="Cristene Espina" class="profile-img">
                <div class="info">
                    <p class="name">Cristene Espina</p>
                    <p class="role">Developer</p>
                </div>
            </div>
            <div class="member">
                <img src="Kyle Maningo.jpg" alt="Kyle Maningo" class="profile-img">
                <div class="info">
                    <p class="name">Kyle Maningo</p>
                    <p class="role">Developer</p>
                </div>
            </div>
            <div class="member">
                <img src="Methuselah Balan.png" alt="Methuselah Balan" class="profile-img">
                <div class="info">
                    <p class="name">Methuselah Balan</p>
                    <p class="role">Developer</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
